<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Page</title>
</head>
<body>
<h2>Страница Админа</h2>

<form th:action="@{/logout}" method="post">
  <button type="submit">Выйти</button>
</form>

<p><a th:href="@{/admin/new}">Создать нового пользователя</a></p>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Username</th>
    <th>Роли</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${findAll}">
    <td th:text="${user.id}"></td>
    <td th:text="${user.username}"></td>
    <td>
      <span th:each="role : ${user.roles}" th:text="${role.role} + ' '"></span>
    </td>
    <td>
      <a th:href="@{/admin/edit(id=${user.id})}">Edit</a> |
      <a th:href="@{/admin/delete?id=${user.id}}">Delete</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
